<!DOCTYPE html>
<html>
<head>
    <title>Gesture Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body{
            margin:0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1{margin-top:20px; color: #00ff88;}
        .container{display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center;}
        .video-container{
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
        }
        #input_video{display: none;}
        #output_canvas{display: block; width: 480px; height: 360px;}

        .demo-panel{
            background: #222;
            padding: 20px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
        }
        video{width: 100%; border-radius: 10px; margin-bottom: 15px;}
        .volume-bar-bg{
            width: 100%; height: 20px; background: #444; border-radius: 10px; overflow: hidden; margin: 10px 0;
        }
        .volume-bar-fill{
            height: 100%; width: 50%; background: linear-gradient(90deg, #00ff88, #00cc6a);
            transition: width 0.1s;
        }
        .status{margin-top: 15px; font-size: 1.2em; font-weight: bold;}
        .instructions{font-size: 0.9em; margin-top: 10px; color: #aaa; text-align: left;}
        
        #startBtn{
            padding: 15px 30px;
            font-size: 1.2em;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px;
            font-weight: bold;
        }
        #startBtn:hover{
            background: #00cc6a;
        }
    </style>
</head>
<body>
    <h1>Gesture Control</h1>
    <button id="startBtn" onclick="startCamera()">Start Camera</button>
    
    <div class="container" id="mainContent" style="display: none;">
        <!--webcam feed-->
        <div class="video-container">
            <video id="input_video"></video>
            <canvas id="output_canvas" width="480" height="360"></canvas>
        </div>

        <!--what we r contrling-->
        <div class="demo-panel">
            <h3>Target Control</h3>
            <!--sample vid to cntrl-->
            <video id="target_video" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>

            <p>Volume Level:</p>
            <div class="volume-bar-bg">
                <div id="volume_fill" class="volume-bar-fill"></div>
            </div>
            <div id="status" class="status">Ready</div>

            <div class="instructions">
                <p><b>Index Finger Up/Down:</b> Change Volume</p>
                <p><b>Pinch Thumb + Index:</b> Play/Pause </p>
            </div>
        </div>
    </div>

    <script>
        const videoElement=document.getElementById('input_video');
        const canvasElement=document.getElementById('output_canvas');
        const canvasCtx=canvasElement.getContext('2d');
        const statusElement=document.getElementById('status');
        const volumeFill=document.getElementById('volume_fill');
        const targetVideo=document.getElementById('target_video');
        const startBtn=document.getElementById('startBtn');
        const mainContent=document.getElementById('mainContent');

        let lastPinchState=false;

        async function startCamera(){
            try{
                const stream = await navigator.mediaDevices.getUserMedia({video: {width: 480, height: 360}});
                videoElement.srcObject = stream;
                startBtn.style.display = 'none';
                mainContent.style.display = 'flex';
                
                const hands=new Hands({locateFile: (file)=> {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }});

                hands.setOptions({maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7});
                hands.onResults(onResults);

                async function processFrame(){
                    if (videoElement.readyState >= 2){
                        await hands.send({image: videoElement});
                    }
                    requestAnimationFrame(processFrame);
                }
                processFrame();
                
                statusElement.textContent='Ready - Show your hand!';
                statusElement.style.color='#00ff88';
            }catch(err){
                console.error('Camera error:', err);
                statusElement.textContent='Camera Error: ' + err.message;
                statusElement.style.color='#ff0055';
                alert('Please allow camera access and refresh the page!');
            }
        }

        function onResults(results){
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
                const landmarks =results.multiHandLandmarks[0];
                const thumbTip=landmarks[4];
                const indexTip=landmarks[8];

                const thumbX=thumbTip.x * canvasElement.width;
                const thumbY=thumbTip.y * canvasElement.height;
                const indexX=indexTip.x * canvasElement.width;
                const indexY=indexTip.y * canvasElement.height;

                //volume control
                const fingerHeight=1-indexTip.y;
                const volume= Math.max(0, Math.min(1, fingerHeight));

                targetVideo.volume=volume;
                volumeFill.style.width=(volume*100) + '%';

                //play puase
                const distance= Math.hypot(thumbTip.x-indexTip.x, thumbTip.y-indexTip.y);
                const isPinched= distance<0.08;
                
                const lineColor=isPinched ? '#ff0055' : '#00ff88';

                //draw vis feedback
                canvasCtx.beginPath();
                canvasCtx.moveTo(thumbX, thumbY);
                canvasCtx.lineTo(indexX,indexY);
                canvasCtx.strokeStyle=lineColor;
                canvasCtx.lineWidth=4;
                canvasCtx.stroke();

                //trigger play/pause only on transition
                if(isPinched && !lastPinchState){
                    if(targetVideo.paused){
                        targetVideo.play();
                        statusElement.textContent = '▶️ Playing';
                        statusElement.style.color = '#00ff88';
                    }else {
                        targetVideo.pause();
                        statusElement.textContent='⏸️ Paused';
                        statusElement.style.color='#ff0055';
                    }
                }
                lastPinchState=isPinched;

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color:lineColor, lineWidth:2});
            }else{
                statusElement.textContent='👋 Show hand';
                statusElement.style.color='#aaa';
            }
            canvasCtx.restore();
        }
    </script>
</body>
</html>
