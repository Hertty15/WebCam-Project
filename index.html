<!DOCTYPE html>
<html>
<head>
    <title>Stardance Gesture Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body{
            margin:0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1{margin-top:20px; color: #00ff88; font-size: 2.5em;}
        .container{display: flex; gap: 30px; margin-top: 30px; flex-wrap: wrap; justify-content: center; align-items: flex-start;}
        .video-container{
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
            border: 3px solid #00ff88;
            background: #000;
        }
        #input_video{display: none;}
        #output_canvas{display: block; width: 640px; height: 480px;}

        .control-panel{
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0,255,136,0.3);
        }
        .volume-display{
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
            color: #00ff88;
        }
        .volume-bar-bg{
            width: 100%; height: 30px; background: #333; border-radius: 15px; overflow: hidden; margin: 20px 0; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .volume-bar-fill{
            height: 100%; width: 50%; background: linear-gradient(90deg, #00ff88, #00cc6a);
            transition: width 0.1s;
            box-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        .status{
            margin: 20px 0; 
            font-size: 1.3em; 
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }
        .instructions{
            font-size: 1em; 
            margin-top: 20px; 
            text-align: left;
            line-height: 1.8;
        }
        .instructions h3{
            color: #00ff88;
            margin-bottom: 15px;
        }
        .instruction-item{
            padding: 10px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border-left: 4px solid #00ff88;
        }
        
        #startBtn{
            padding: 20px 40px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin: 30px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,255,136,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #startBtn:hover{
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(0,255,136,0.6);
        }
        #startBtn:active{
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <h1>🌟 Stardance Gesture Control</h1>
    <button id="startBtn" onclick="startCamera()">📹 Start Camera</button>
    
    <div class="container" id="mainContent" style="display: none;">
        <!--webcam feed-->
        <div class="video-container">
            <video id="input_video"></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
        </div>

        <!--control panel-->
        <div class="control-panel">
            <h2 style="margin-top:0; color:#00ff88;">🎛️ Volume Control</h2>
            
            <div class="volume-display" id="volume_text">50%</div>
            
            <div class="volume-bar-bg">
                <div id="volume_fill" class="volume-bar-fill"></div>
            </div>
            
            <div id="status" class="status">👋 Show your hand!</div>

            <div class="instructions">
                <h3>How to Use:</h3>
                <div class="instruction-item">
                    <strong>👆 Index Finger Up/Down</strong><br>
                    Change system volume
                </div>
                <div class="instruction-item">
                    <strong>🤏 Pinch Thumb + Index</strong><br>
                    Play/Pause media
                </div>
                <div class="instruction-item">
                    <strong>💡 Tip</strong><br>
                    Keep hand steady for best results
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement=document.getElementById('input_video');
        const canvasElement=document.getElementById('output_canvas');
        const canvasCtx=canvasElement.getContext('2d');
        const statusElement=document.getElementById('status');
        const volumeFill=document.getElementById('volume_fill');
        const volumeText=document.getElementById('volume_text');
        const startBtn=document.getElementById('startBtn');
        const mainContent=document.getElementById('mainContent');

        let lastPinchState=false;
        let hands;

        async function startCamera(){
            try{
                // Request camera permission
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: {ideal: 640},
                        height: {ideal: 480},
                        facingMode: "user"
                    }
                });
                
                videoElement.srcObject = stream;
                
                // Wait for video to be ready
                await new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        resolve();
                    };
                });
                
                // Hide button, show main content
                startBtn.style.display = 'none';
                mainContent.style.display = 'flex';
                
                // Initialize MediaPipe Hands
                hands = new Hands({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }});

                hands.setOptions({
                    maxNumHands: 1, 
                    modelComplexity: 1, 
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });
                
                hands.onResults(onResults);
                
                // Start processing
                processFrame();
                
                statusElement.textContent = '✓ Ready - Show your hand!';
                statusElement.style.color = '#00ff88';
                statusElement.style.background = 'rgba(0,255,136,0.2)';
                
            } catch(err){
                console.error('Camera error:', err);
                statusElement.textContent = '❌ Camera Error: ' + err.message;
                statusElement.style.color = '#ff0055';
                statusElement.style.background = 'rgba(255,0,85,0.2)';
                alert('Please allow camera access and refresh the page!');
            }
        }

        async function processFrame(){
            if (hands && videoElement.readyState >= 2){
                try{
                    await hands.send({image: videoElement});
                } catch(e){
                    console.error('Processing error:', e);
                }
            }
            requestAnimationFrame(processFrame);
        }

        function onResults(results){
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
                const landmarks = results.multiHandLandmarks[0];
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];

                const thumbX = thumbTip.x * canvasElement.width;
                const thumbY = thumbTip.y * canvasElement.height;
                const indexX = indexTip.x * canvasElement.width;
                const indexY = indexTip.y * canvasElement.height;

                // Volume control (index finger height)
                const fingerHeight = 1 - indexTip.y;
                const volume = Math.max(0, Math.min(1, fingerHeight));
                const volumePercent = Math.round(volume * 100);

                // Update volume display
                volumeFill.style.width = volumePercent + '%';
                volumeText.textContent = volumePercent + '%';

                // Play/Pause (pinch detection)
                const distance = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                const isPinched = distance < 0.08;
                
                const lineColor = isPinched ? '#ff0055' : '#00ff88';
                const lineWidth = isPinched ? 6 : 4;

                // Draw line between thumb and index
                canvasCtx.beginPath();
                canvasCtx.moveTo(thumbX, thumbY);
                canvasCtx.lineTo(indexX, indexY);
                canvasCtx.strokeStyle = lineColor;
                canvasCtx.lineWidth = lineWidth;
                canvasCtx.stroke();

                // Draw circles at fingertips
                canvasCtx.beginPath();
                canvasCtx.arc(thumbX, thumbY, 12, 0, 2 * Math.PI);
                canvasCtx.fillStyle = lineColor;
                canvasCtx.fill();
                
                canvasCtx.beginPath();
                canvasCtx.arc(indexX, indexY, 12, 0, 2 * Math.PI);
                canvasCtx.fillStyle = lineColor;
                canvasCtx.fill();

                // Update status
                if (isPinched && !lastPinchState) {
                    statusElement.textContent = '🎵 Pinch detected!';
                    statusElement.style.color = '#ff0055';
                    statusElement.style.background = 'rgba(255,0,85,0.2)';
                } else if (!isPinched) {
                    statusElement.textContent = '✓ Volume: ' + volumePercent + '%';
                    statusElement.style.color = '#00ff88';
                    statusElement.style.background = 'rgba(0,255,136,0.2)';
                }
                
                lastPinchState = isPinched;

                // Draw hand connections
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00ff88', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: '#00ff88', lineWidth: 1, radius: 3});
                
            } else {
                statusElement.textContent = ' Show your hand to control volume';
                statusElement.style.color = '#aaa';
                statusElement.style.background = 'rgba(0,0,0,0.3)';
            }
            canvasCtx.restore();
        }
    </script>
</body>
</html>
