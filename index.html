<!DOCTYPE html>
<html>
<head>
    <title>Gesture Control</title>
    <script src="https://cdn.jsdeliver.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdeliver.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdeliver.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body{
            margin:0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1{margin-top:20px; color: #00ff88;}
        .container{display: flex; gap: 20px; margin-top: 20px;}
        .video-container{
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
        }
        #input_video{display: none;}
        #output_canvas{display: block; width: 480px; height: 360px;}

        .demo-panel{
            background: #222;
            padding: 20px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
        }
        video{width: 100%; height: 20px; background: #444; border-radius: 10px; overflow: hidden;}
        .volume-bar-fill{
            height: 100%; width: 50%; background: linear-gradient(90deg, #00ff88, #00cc6a);
            transition: width 0.1s;
        }
        .status{margin-top: 15px; font-size: 1.2em; font-weight: bold;}
        .instructions{font-size: 0.9em; margin-top: 10px; color: #aaa; text-align: left;}
    </style>
</head>
<body>
    <h1>Gesture Control</h1>
    <div class="container">
        <!--webcam feed-->
        <div class="video-container">
            <video id="input_video"></video>
            <canvas id="output_canvas" width="480" height="360"></canvas>
        </div>

        <!--what we r contrling-->
        <div class="demo-panel">
            <h3>Target Control</h3>
            <!--sample vid to cntrl-->
            <video id="target_video" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>

            <p>Volume Level:</p>
            <div class="volume-bar-bg">
                <div id="volume_fill" class="volume-bar-fill"></div>
            </div>
            <div id="status" class="status">Ready</div>

            <div class="instructions">
                <p><b>Index Finger Up/Down:</b> Change Volume</p>
                <p><b>Pinch Thumb + Index:</b> Play/Pause </p>
            </div>
        </div>
    </div>

    <script>
        const videoElement=document.getElementById('input_video');
        const canvasElement=document.getElementById('output_canvas');
        const canvasCtx=canvasElement.getContext('2d');
        const statusElement=document.getElementById('status');
        const volumeFill=document.getElementById('volume_fill');
        const targetVideo=document.getElementById('target_video');

        let isPaused=false;
        let lastPinchState=false;

        function onResults(results){
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
                const landmarks =results.multiHandLandmarks[0];
                const thumbTip=landmarks[4];
                const indexTip=landmarks[8];

                const thumbX=thumbTip.x * canvasElement.width;
                const thumbY=thumbTip.y * canvasElement.height;
                const indexX=indexTip.x * canvasElement.width;
                const indexY=indexTip.y * canvasElement.height;

                //volume control
                //invert y cuz camera y is upside down relative to screen
                const fingerHeight=1-indexTip.y;
                const volume= Math.max(0, Math.min(1, fingerHeight));

                targetVideo.volume=volume;
                volumeFill.style.width=(volume*100) + '%';

                //play puase
                const distance= Math.hypot(thumbTip.x-indexTip.x, thumbTip.y-indexTip.y);
                const isPinched= distance<0.08;
                
                const lineColor=isPinched ? '#ff0055' : '#00ff88';

                //draw vis feedback
                canvasCtx.beginPath();
                canvasCtx.moveTo(thumbX, thumbY);
                canvasCtx.lineTo(indexX,indexY);
                canvasCtx.strokeStyle=lineColor;
                canvasCtx.lineWidth=4;
                canvasCtx.stroke();

                //trigger play/pause only on transition
                if(isPinched && !lastPinchState){
                    if(targetVideo.paused){
                        targetVideo.play();
                        statusElement.textContent = 'Playing';
                        statusElement.textContent = '#00ff88';
                    }else {
                        targetVideo.pause();
                        statusElement.textContent='Paused';
                        statusElement.textContent='#ff0055';
                    }
                }
                lastPinchState=isPinched;

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color:lineColor, lineWidth:2});
            }else{
                statusElement.textContent='Show Hand';
                statusElement.textContent='#aaa';
            }
            canvasCtx.restore();
        }

        const hands=new Hands({locateFile: (file)=> {
            return `https://cdn.jsdeliver.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7});
        hands.onResults(onResults);

        const camera=new Camera(videoElement, {
            onFrame:async () =>{await hands.send({image: videoElement});},
            width: 480, height:360
        });

        camera.start().then(()=>{
            statusElement.textContent='Ready';
            statusElement.textContent='#00ff88';
        });
    </script>
</body>
</html>
